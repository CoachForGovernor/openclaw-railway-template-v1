<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenClaw Setup Login</title>
    <link rel="stylesheet" href="/styles.css" />
    <style>
      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
      }

      .login-panel {
        width: min(100%, 420px);
        background: var(--surface, #fff);
        border: 1px solid var(--border, #e5e7eb);
        border-radius: 8px;
        padding: 2rem;
        box-shadow: 0 16px 40px rgba(15, 23, 42, 0.12);
      }

      .login-panel h1 {
        margin: 0 0 0.5rem;
        font-size: 1.5rem;
        letter-spacing: 0;
      }

      .login-panel p {
        margin: 0 0 1.5rem;
      }

      .login-panel label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 600;
      }

      .login-panel input {
        width: 100%;
        box-sizing: border-box;
        margin-bottom: 1rem;
      }

      .login-panel button {
        width: 100%;
      }

      .login-error {
        display: none;
        margin-bottom: 1rem;
        color: #b42318;
      }
    </style>
  </head>
  <body>
    <main class="login-panel">
      <h1>OpenClaw Setup</h1>
      <p class="text-muted">Enter the setup password stored in Railway.</p>
      <p id="login-error" class="login-error" role="alert">Incorrect password.</p>
      <form method="post" action="/setup/login">
        <input id="next" name="next" type="hidden" value="/setup" />
        <label for="password">Setup password</label>
        <input
          id="password"
          name="password"
          type="password"
          autocomplete="current-password"
          required
          autofocus
        />
        <button class="btn btn-primary" type="submit">Sign in</button>
      </form>
    </main>
    <script>
      const params = new URLSearchParams(window.location.search);
      document.getElementById("next").value = params.get("next") || "/setup";
      document.getElementById("login-error").style.display =
        params.get("error") === "1" ? "block" : "none";
    </script>
  </body>
</html>
